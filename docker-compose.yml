services:
  postgres:
    image: postgres:17
    container_name: rms-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rms
    ports:
      - "${DB_PORT_HOST:-5435}:${DB_PORT_CONTAINER:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seeds/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seeds/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

  api:
    build: .
    container_name: rms-api
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST_DOCKER:-postgres}
      DB_PORT: ${DB_PORT_CONTAINER:-5432}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data: